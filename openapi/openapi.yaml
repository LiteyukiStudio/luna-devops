components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: lyd_session
      description: HttpOnly browser session cookie. Sensitive interactive operations do not accept personal access tokens as a substitute.
    BearerToken:
      type: http
      scheme: bearer
      bearerFormat: Luna personal access token

  parameters:
    AccountId:
      name: accountId
      in: path
      required: true
      schema: { type: string }
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema: { type: string }
    BindingId:
      name: bindingId
      in: path
      required: true
      schema: { type: string }
    ClusterId:
      name: clusterId
      in: path
      required: true
      schema: { type: string }
    CredentialId:
      name: credentialId
      in: path
      required: true
      schema: { type: string }
    IdentityId:
      name: identityId
      in: path
      required: true
      schema: { type: string }
    MemberId:
      name: memberId
      in: path
      required: true
      schema: { type: string }
    OAuthCode:
      name: code
      in: query
      required: true
      schema: { type: string }
    OAuthState:
      name: state
      in: query
      required: true
      schema: { type: string }
    Owner:
      name: owner
      in: path
      required: true
      schema: { type: string }
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ProjectId:
      name: projectId
      in: path
      required: true
      schema: { type: string }
    ProviderId:
      name: providerId
      in: path
      required: true
      schema: { type: string }
    RegistryId:
      name: registryId
      in: path
      required: true
      schema: { type: string }
    Repo:
      name: repo
      in: path
      required: true
      schema: { type: string }
    ReleaseId:
      name: releaseId
      in: path
      required: true
      schema: { type: string }
    SortOrder:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    TargetId:
      name: targetId
      in: path
      required: true
      schema: { type: string }
    TokenId:
      name: tokenId
      in: path
      required: true
      schema: { type: string }
    UserId:
      name: userId
      in: path
      required: true
      schema: { type: string }

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
        error:
          type: string
          description: Safe user-facing error message.
        detail:
          type: string
          description: Development-only diagnostic detail.
        purpose:
          type: string
          description: Step-up purpose returned with `mfa_required`.
      required: [code, error]
    AuthSessionResponse:
      type: object
      properties:
        user:
          type: object
          additionalProperties: true
      required: [user]
    BootstrapStatus:
      type: object
      properties:
        mode:
          type: string
          enum: [development, production]
          description: Production initialization requires the API process to have `BOOTSTRAP_TOKEN` configured and the same value supplied as `bootstrapToken`.
        initialized: { type: boolean }
        devLoginEnabled: { type: boolean }
        devLoginHint:
          type: object
          description: Present only in development mode.
          properties:
            email: { type: string, format: email }
            password: { type: string }
          required: [email, password]
      required: [mode, initialized, devLoginEnabled]
    ConfigDefinition:
      type: object
      properties:
        key: { type: string }
        labelKey:
          type: string
          description: Stable frontend i18n key for the setting label; the backend does not localize labels.
        descriptionKey:
          type: string
          description: Stable frontend i18n key for the setting description; the backend does not localize descriptions.
        type: { type: string, enum: [string, textarea, select, boolean, number] }
        public: { type: boolean }
        default: { type: string }
        options:
          type: array
          items: { type: string }
      required: [key, labelKey, descriptionKey, type, public, default]
    MFAStatus:
      type: object
      properties:
        enabled: { type: boolean }
        pending: { type: boolean }
        policyEnabled: { type: boolean }
        enrollmentReauthMode:
          type: string
          enum: [password, fresh_session]
          description: Primary reauthentication required before starting enrollment. Local accounts use `password`; OIDC accounts require fresh non-impersonated primary authentication, which remember-token recovery cannot refresh.
        confirmedAt:
          type: [string, "null"]
          format: date-time
        recoveryCodesRemaining: { type: integer, minimum: 0 }
      required: [enabled, pending, policyEnabled, enrollmentReauthMode, confirmedAt, recoveryCodesRemaining]
    MFAEnrollmentInput:
      type: object
      properties:
        currentPassword:
          type: string
          format: password
          writeOnly: true
          description: Required for local accounts and ignored for OIDC accounts.
    DataExportAuthorization:
      type: object
      properties:
        ticket:
          type: string
          description: Random one-time ticket. The backend stores only its hash in production.
        expiresAt:
          type: string
          format: date-time
      required: [ticket, expiresAt]
    MFAEnrollment:
      type: object
      properties:
        secret:
          type: string
          description: Base32 TOTP secret returned only while enrolling.
        otpauthUrl: { type: string, format: uri }
        qrCodeDataUrl:
          type: string
          description: PNG data URL for the enrollment QR code.
      required: [secret, otpauthUrl, qrCodeDataUrl]
    MFAConfirmInput:
      type: object
      properties:
        code: { type: string, pattern: "^[0-9]{6}$" }
      required: [code]
    MFARecoveryCodes:
      type: object
      properties:
        recoveryCodes:
          type: array
          minItems: 10
          maxItems: 10
          items:
            type: string
            pattern: "^[A-Z2-7]{4}(?:-[A-Z2-7]{4}){3}$"
      required: [recoveryCodes]
    MFAConfirmResult:
      allOf:
        - $ref: "#/components/schemas/MFARecoveryCodes"
        - type: object
          properties:
            enabled: { type: boolean, const: true }
          required: [enabled]
    MFAPurpose:
      type: string
      enum:
        - runtime_exec
        - runtime_terminal
        - data_export
        - secret_update
        - registry_credential_update
        - kubeconfig_update
        - auth_provider_update
        - user_admin_update
        - mfa_manage
        - security_settings_update
        - data_retention_cleanup
    MFAVerifyInput:
      type: object
      properties:
        purpose: { $ref: "#/components/schemas/MFAPurpose" }
        code: { type: string, pattern: "^[0-9]{6}$" }
        recoveryCode:
          type: string
          description: One-time recovery code. Hyphens and case are normalized before verification.
      required: [purpose]
      oneOf:
        - required: [code]
          not: { required: [recoveryCode] }
        - required: [recoveryCode]
          not: { required: [code] }
    MFAVerifyResult:
      type: object
      properties:
        verified: { type: boolean, const: true }
        purpose: { $ref: "#/components/schemas/MFAPurpose" }
      required: [verified, purpose]
    AccessTokenInput:
      type: object
      properties:
        name: { type: string }
        scope:
          type: string
          description: "Comma-separated scopes. Wildcard and unknown scopes are rejected. Normal users can create read scopes only."
        expiresInDays: { type: integer, enum: [0, 7, 15, 30, 90], description: "0 means never expires." }
      required: [name, scope]
    ApplicationInput:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        sourceType: { type: string, enum: [repository, image] }
        repositoryUrl: { type: string }
        imageReference: { type: string }
        dockerfilePath: { type: string }
        buildContext: { type: string }
        servicePort: { type: integer }
      required: [name, slug, sourceType]
    ArtifactRegistryInput:
      type: object
      properties:
        name: { type: string }
        provider: { type: string, enum: [harbor, dockerhub, gitea-registry] }
        endpoint: { type: string }
        namespace: { type: string }
        scope: { type: string, enum: [global, project, user] }
        ownerRef: { type: string }
        isDefault: { type: boolean }
        capabilities: { type: array, items: { type: string } }
      required: [name, provider, endpoint, scope]
    AuthAdmissionPolicyInput:
      type: object
      properties:
        allowLocalLogin: { type: boolean }
        allowOidcLogin: { type: boolean }
        allowedEmailDomains: { type: array, items: { type: string } }
        allowedOidcGroups: { type: array, items: { type: string } }
        invitedEmails: { type: array, items: { type: string } }
        defaultRole: { type: string, enum: [platform_admin, user] }
    AuthProviderInput:
      type: object
      properties:
        type: { type: string, enum: [oidc] }
        name: { type: string }
        enabled: { type: boolean }
        issuerUrl: { type: string }
        clientId: { type: string }
        clientSecret: { type: string }
        scopes: { type: string }
        groupClaim: { type: string }
        emailClaim: { type: string }
        usernameClaim: { type: string }
        isDefault: { type: boolean }
      required: [name, issuerUrl, clientId]
    ConfigKeysInput:
      type: object
      properties:
        keys:
          type: array
          items: { type: string }
      required: [keys]
    ContainerImageInput:
      type: object
      properties:
        projectId: { type: string }
        applicationId: { type: string }
        registryId: { type: string }
        repository: { type: string }
        tag: { type: string }
        digest: { type: string }
        imageRef: { type: string }
        sourceCommit: { type: string }
        buildRunId: { type: string }
        sourceType: { type: string }
        scanStatus: { type: string }
      required: [registryId, repository, tag]
    ReleaseImageCandidate:
      type: object
      properties:
        key: { type: string }
        source: { type: string, enum: [registry, build, target] }
        label: { type: string }
        imageRef: { type: string }
        buildRunId: { type: string }
        tag: { type: string }
        digest: { type: string }
        sourceCommit: { type: string }
        createdAt: { type: string, format: date-time }
    ReleaseImageCandidates:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReleaseImageCandidate"
        registryAvailable: { type: boolean }
        registryError: { type: string }
        fallbackUsed: { type: boolean }
    GitAccountInput:
      type: object
      properties:
        providerId: { type: string }
        scope: { type: string, enum: [global, project, user] }
        ownerRef: { type: string }
        externalUserId: { type: string }
        username: { type: string }
        avatarUrl: { type: string }
        accessToken: { type: string, writeOnly: true }
        refreshToken: { type: string, writeOnly: true }
        scopes: { type: array, items: { type: string } }
        status: { type: string, enum: [connected, expired, revoked] }
      required: [providerId, username]
    GitProviderInput:
      type: object
      properties:
        type: { type: string, enum: [github, gitea, gitlab] }
        name: { type: string }
        baseUrl: { type: string }
        scope: { type: string, enum: [global, project, user] }
        ownerRef: { type: string }
        authType: { type: string, enum: [oauth, github-app, pat] }
        clientId: { type: string }
        clientSecret: { type: string, writeOnly: true }
        enabled: { type: boolean }
      required: [name]
    InitializeAdminInput:
      type: object
      properties:
        email: { type: string, format: email }
        name: { type: string }
        password: { type: string, minLength: 8 }
        language: { type: string, enum: [zh-CN, en-US] }
        bootstrapToken:
          type: string
          writeOnly: true
          description: Required when `mode` is `production`; must exactly match the API process `BOOTSTRAP_TOKEN`. Ignored in development.
        rememberMe:
          type: boolean
          default: false
          description: When true, also creates a rotating, per-user 30-day HttpOnly remember cookie. The regular session remains valid for 24 hours.
      required: [email, password]
    LoginInput:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string }
        rememberMe:
          type: boolean
          default: false
          description: When true, also creates a rotating, per-user 30-day HttpOnly remember cookie. The regular session remains valid for 24 hours.
      required: [email, password]
    ResumeLoginInput:
      type: object
      properties:
        userId:
          type: string
          description: User selected from locally stored recent-account display metadata; authentication still requires that user's HttpOnly remember cookie.
      required: [userId]
    ProjectInput:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        namespaceStrategy: { type: string, enum: [project] }
        maxConcurrentBuilds: { type: integer, minimum: 1 }
        webConsoleEnabled:
          type: boolean
          default: true
          description: Project-space master switch for release Web Console and runtime exec access. Omission on create defaults to true; omission on update preserves the current value. When false, no deployment target can re-enable Web Console. Project roles and Step-up MFA still apply.
      required: [name, slug]
    Project:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        namespaceStrategy: { type: string, enum: [project] }
        maxConcurrentBuilds: { type: integer }
        webConsoleEnabled:
          type: boolean
          description: Project-space master switch. A false value disables Web Console for every deployment target in the project space.
        createdAt: { type: string, format: date-time }
      required: [id, name, slug, namespaceStrategy, maxConcurrentBuilds, webConsoleEnabled, createdAt]
    DeploymentTargetInput:
      type: object
      description: Deployment target create/update payload. Other build and Kubernetes fields are accepted by the implemented endpoint; `webConsoleEnabled` is documented here because it has inherited policy semantics.
      additionalProperties: true
      properties:
        webConsoleEnabled:
          type: [boolean, "null"]
          default: null
          description: "`null` inherits the project-space master switch and `false` disables Web Console for this deployment target. `true` is normalized to inheritance for compatibility and cannot bypass a disabled project-space switch."
    DeploymentTarget:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        projectId: { type: string }
        applicationId: { type: string }
        webConsoleEnabled:
          type: [boolean, "null"]
          description: Nullable target restriction. Effective policy is `project.webConsoleEnabled && webConsoleEnabled != false`; a true value is treated as inheritance.
      required: [id, projectId, applicationId, webConsoleEnabled]
    PaginatedProjectList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        page: { type: integer }
        pageSize: { type: integer }
        sortBy: { type: string }
        sortOrder: { type: string, enum: [asc, desc] }
        total: { type: integer }
        totalPages: { type: integer }
    ProjectPin:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        namespaceStrategy: { type: string, enum: [project] }
        createdAt: { type: string, format: date-time }
        pinnedAt: { type: string, format: date-time }
    ProjectMemberInput:
      type: object
      properties:
        email: { type: string }
        role: { type: string, enum: [owner, admin, developer, viewer] }
      required: [email, role]
    RegistryCredentialInput:
      type: object
      properties:
        name: { type: string }
        username: { type: string }
        password: { type: string }
        token: { type: string }
        usage: { type: string, enum: [pull, push, push-pull] }
        scope: { type: string, enum: [user, project, global] }
        projectIds:
          type: array
          items: { type: string }
        repositoryTemplate: { type: string }
        tagTemplate: { type: string }
    RegistryCredential:
      type: object
      properties:
        id: { type: string }
        registryId: { type: string }
        name: { type: string }
        username: { type: string }
        usage: { type: string, enum: [pull, push, push-pull] }
        scope: { type: string, enum: [user, project, global] }
        ownerRef: { type: string }
        projectIds:
          type: array
          items: { type: string }
        repositoryTemplate: { type: string }
        tagTemplate: { type: string }
        passwordSet: { type: boolean }
        tokenSet: { type: boolean }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - registryId
        - name
        - username
        - usage
        - scope
        - ownerRef
        - projectIds
        - repositoryTemplate
        - tagTemplate
        - passwordSet
        - tokenSet
        - createdAt
    RepositoryBindingInput:
      type: object
      properties:
        applicationId: { type: string }
        gitAccountId: { type: string }
        owner: { type: string }
        repo: { type: string }
        cloneUrl: { type: string }
        defaultBranch: { type: string }
        webhookStatus: { type: string, enum: [pending, created, disabled, failed] }
      required: [applicationId, gitAccountId, owner, repo]
    UpdateConfigsInput:
      type: object
      properties:
        values:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
              - type: object
              - type: array
      required: [values]
    DataRetentionDataset:
      type: object
      properties:
        key:
          type: string
          enum: [platform_events, notification_deliveries, worker_task_events, build_logs, release_logs, hook_run_logs, expired_auth_data]
        configKey: { type: string }
        defaultDays: { type: integer, minimum: 0, maximum: 3650 }
      required: [key, configKey, defaultDays]
    DataRetentionCatalogResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/DataRetentionDataset" }
      required: [items]
    DataRetentionRequest:
      type: object
      properties:
        datasets:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [platform_events, notification_deliveries, worker_task_events, build_logs, release_logs, hook_run_logs, expired_auth_data]
        startAt: { type: string, format: date-time }
        endAt: { type: string, format: date-time }
      required: [datasets, startAt, endAt]
    DataRetentionResult:
      type: object
      properties:
        dataset: { type: string }
        matched: { type: integer, format: int64, minimum: 0 }
        deleted: { type: integer, format: int64, minimum: 0 }
      required: [dataset, matched, deleted]
    DataRetentionResultResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/DataRetentionResult" }
      required: [items]
    UpdateCurrentUserInput:
      type: object
      properties:
        name: { type: string }
        avatarUrl: { type: string }
        language: { type: string, enum: [zh-CN, en-US] }
    UserInput:
      type: object
      properties:
        email: { type: string }
        name: { type: string }
        password: { type: string }
        role: { type: string, enum: [platform_admin, user] }
        language: { type: string, enum: [zh-CN, en-US] }
        disabled: { type: boolean }
      required: [email, name]
