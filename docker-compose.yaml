services:
  postgres:
    image: postgres:17-alpine
    networks:
      - devops-internal
    environment:
      POSTGRES_DB: devops
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    networks:
      - devops-internal
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command:
      - /bin/sh
      - -ec
      - exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: liteyukistudio/devops-api:${DEVOPS_IMAGE_TAG:-nightly}
    networks:
      - devops-internal
    environment:
      API_ADDR: :8080
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:?SECRET_ENCRYPTION_KEY is required}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://devops:devops@postgres:5432/devops?sslmode=disable}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8088}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:8088}
      REDIS_ADDR: redis:6379
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: ${REDIS_DB:-0}
      METRICS_ENABLED: ${API_METRICS_ENABLED:-${METRICS_ENABLED:-false}}
      METRICS_ADDR: ${API_METRICS_ADDR:-:9090}
      METRICS_PATH: ${API_METRICS_PATH:-${METRICS_PATH:-/metrics}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "9090"
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  worker:
    image: liteyukistudio/devops-worker:${DEVOPS_IMAGE_TAG:-nightly}
    networks:
      - devops-internal
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:?SECRET_ENCRYPTION_KEY is required}
      DATABASE_URL: ${DATABASE_URL:-postgres://devops:devops@postgres:5432/devops?sslmode=disable}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8088}
      REDIS_ADDR: redis:6379
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: ${REDIS_DB:-0}
      DEPLOY_ROLLOUT_TIMEOUT_SECONDS: ${DEPLOY_ROLLOUT_TIMEOUT_SECONDS:-600}
      CERT_MANAGER_CLUSTER_ISSUER: ${CERT_MANAGER_CLUSTER_ISSUER:-letsencrypt-http01}
      BUILD_EXECUTOR_IMAGE: ${BUILD_EXECUTOR_IMAGE:-moby/buildkit:v0.24.0-rootless}
      BUILD_EGRESS_MODE: ${BUILD_EGRESS_MODE:-permissive}
      BUILD_JOB_TIMEOUT_SECONDS: ${BUILD_JOB_TIMEOUT_SECONDS:-1800}
      BUILD_JOB_TTL_SECONDS: ${BUILD_JOB_TTL_SECONDS:-3600}
      BUILD_CACHE_ENABLED: ${BUILD_CACHE_ENABLED:-false}
      BUILD_CACHE_TAG: ${BUILD_CACHE_TAG:-buildcache}
      BUILD_NPM_REGISTRY: ${BUILD_NPM_REGISTRY:-}
      BUILD_PRIVATE_EGRESS_CIDRS: ${BUILD_PRIVATE_EGRESS_CIDRS:-}
      BUILD_PRIVATE_EGRESS_PORTS: ${BUILD_PRIVATE_EGRESS_PORTS:-443}
      BUILD_BLOCKED_EGRESS_CIDRS: ${BUILD_BLOCKED_EGRESS_CIDRS:-}
      METRICS_ENABLED: ${WORKER_METRICS_ENABLED:-${METRICS_ENABLED:-false}}
      METRICS_ADDR: ${WORKER_METRICS_ADDR:-:9091}
      METRICS_PATH: ${WORKER_METRICS_PATH:-${METRICS_PATH:-/metrics}}
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "9091"

volumes:
  postgres-data:

networks:
  devops-internal:
