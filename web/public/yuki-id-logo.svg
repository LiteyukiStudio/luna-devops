<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" fill="none" viewBox="0 0 512 512" role="img" aria-labelledby="yuki-id-logo-title yuki-id-logo-desc">
  <title id="yuki-id-logo-title">Yuki ID Logo</title>
