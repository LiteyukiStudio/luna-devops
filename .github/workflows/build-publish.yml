name: Build & Publish Containers

on:
  push:
    branches: [main, dev]
    tags: [v*]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  CONTAINER_PLATFORMS: linux/amd64
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: liteyukistudio
  IMAGE_API: devops-api
  IMAGE_WORKER: devops-worker
  IMAGE_GATEWAY_TRAFFIC_PROBE: devops-gateway-traffic-probe

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Release Quality Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.2-alpine
        env:
          POSTGRES_USER: devops
          POSTGRES_PASSWORD: devops
          POSTGRES_DB: devops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U devops -d devops"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AUTH_TEST_DATABASE_URL: postgres://devops:devops@127.0.0.1:5432/devops?sslmode=disable
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            web/pnpm-lock.yaml
            docs/pnpm-lock.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run release quality checks
        run: scripts/release-check.sh

  container:
    name: Build & Publish ${{ matrix.title }} Image
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: API
            image: devops-api
            target: runtime-embed-web
            build_args: TARGET=api
          - title: Worker
            image: devops-worker
            target: runtime
            build_args: TARGET=worker
          - title: Gateway Traffic Probe
            image: devops-gateway-traffic-probe
            target: runtime-probe
            build_args: TARGET=gateway-traffic-probe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          image_prefix="${DOCKERHUB_NAMESPACE}"
          image_name="${{ matrix.image }}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version_tag="${GITHUB_REF#refs/tags/}"
            image_tags="${image_prefix}/${image_name}:${version_tag}"
            if [[ "${version_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              image_tags="${image_tags}"$'\n'"${image_prefix}/${image_name}:latest"
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            short_sha="${GITHUB_SHA::12}"
            image_tags="${image_prefix}/${image_name}:pr-${short_sha}"
          else
            image_tags="${image_prefix}/${image_name}:nightly"
          fi
          {
            echo "image_tags<<EOF"
            echo "${image_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push ${{ matrix.title }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ env.CONTAINER_PLATFORMS }}
          build-args: |
            ${{ matrix.build_args }}
          tags: |
            ${{ steps.meta.outputs.image_tags }}
