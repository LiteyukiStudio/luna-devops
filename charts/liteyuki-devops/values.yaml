nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

app:
  env: production
  logLevel: info
  publicBaseUrl: http://localhost:8088
  corsOrigins: ""
  secretEncryptionKey: ""
  existingSecret: ""
  secretEncryptionKeyKey: secret-encryption-key
  extraEnv: {}

api:
  replicaCount: 1
  image:
    repository: liteyukistudio/devops-api
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}

metrics:
  enabled: false
  path: /metrics
  service:
    enabled: false
    annotations: {}
    labels: {}
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
  grafanaDashboard:
    enabled: false
    labels:
      grafana_dashboard: "1"
    annotations: {}
  api:
    addr: ":9090"
    port: 9090
  worker:
    addr: ":9091"
    port: 9091

worker:
  replicaCount: 1
  image:
    repository: liteyukistudio/devops-worker
    tag: ""
    pullPolicy: IfNotPresent
  deployRolloutTimeoutSeconds: 600
  certManagerClusterIssuer: letsencrypt-http01
  buildExecutorImage: moby/buildkit:v0.24.0-rootless
  buildEgressMode: permissive
  buildJobTimeoutSeconds: 1800
  buildJobTtlSeconds: 3600
  buildCacheEnabled: false
  buildCacheTag: buildcache
  buildNpmRegistry: ""
  buildPrivateEgressCidrs: ""
  buildPrivateEgressPorts: "443"
  buildBlockedEgressCidrs: ""
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: 17-alpine
    pullPolicy: IfNotPresent
  auth:
    database: devops
    username: devops
    password: ""
    existingSecret: ""
    passwordKey: postgres-password
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

externalDatabase:
  url: ""
  existingSecret: ""
  urlKey: database-url

redis:
  enabled: true
  image:
    repository: redis
    tag: 8-alpine
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

externalRedis:
  addr: ""
  existingSecret: ""
  addrKey: redis-addr

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: devops.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext: {}

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
