name: Build & Publish Containers

on:
  push:
    branches: [main, dev]
    tags: [v*]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  CONTAINER_PLATFORMS: linux/amd64
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: liteyukistudio
  IMAGE_API: devops-api
  IMAGE_WORKER: devops-worker
  IMAGE_GATEWAY_TRAFFIC_PROBE: devops-gateway-traffic-probe

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  container:
    name: Build & Publish ${{ matrix.title }} Image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: API
            image: devops-api
            target: runtime-embed-web
            build_args: TARGET=api
          - title: Worker
            image: devops-worker
            target: runtime
            build_args: TARGET=worker
          - title: Gateway Traffic Probe
            image: devops-gateway-traffic-probe
            target: runtime-probe
            build_args: TARGET=gateway-traffic-probe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          image_prefix="${DOCKERHUB_NAMESPACE}"
          image_name="${{ matrix.image }}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version_tag="${GITHUB_REF#refs/tags/}"
            image_tags="${image_prefix}/${image_name}:${version_tag}"
            if [[ "${version_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              image_tags="${image_tags}"$'\n'"${image_prefix}/${image_name}:latest"
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            short_sha="${GITHUB_SHA::12}"
            image_tags="${image_prefix}/${image_name}:pr-${short_sha}"
          else
            image_tags="${image_prefix}/${image_name}:nightly"
          fi
          {
            echo "image_tags<<EOF"
            echo "${image_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push ${{ matrix.title }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ env.CONTAINER_PLATFORMS }}
          build-args: |
            ${{ matrix.build_args }}
          tags: |
            ${{ steps.meta.outputs.image_tags }}
