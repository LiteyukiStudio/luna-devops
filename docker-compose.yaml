services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: devops
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: api
    environment:
      API_ADDR: :8080
      APP_ENV: development
      DATABASE_URL: postgres://devops:devops@postgres:5432/devops?sslmode=disable
      PUBLIC_BASE_URL: http://localhost:8088
      APP_CORS_ORIGINS: http://localhost:8088
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: worker
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://devops:devops@postgres:5432/devops?sslmode=disable
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  builder:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: builder
    environment:
      APP_ENV: development
      REDIS_ADDR: redis:6379
      BUILDER_AGENT_NAME: local-docker-builder
      BUILDER_SCOPES: ${BUILDER_SCOPES:-}
      BUILDER_LABELS: ${BUILDER_LABELS:-}
      BUILDER_WORKSPACE_HOST_ROOT: ${BUILDER_WORKSPACE_HOST_ROOT:-/Users/sfkm/Developer/liteyuki-studio/devops/.local/builder-workspace}
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.local/builder-workspace:/builder-workspace
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8088:80"
    depends_on:
      - api

volumes:
  postgres-data:
